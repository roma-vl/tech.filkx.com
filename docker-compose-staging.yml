services:
  # ================= FRONTEND (dist + nginx) =================
  staging-tech-frontend:
    build:
      context: frontend/docker
      dockerfile: staging/nginx/Dockerfile
      args:
        - VITE_API_BASE_URL=https://staging.tech.filkx.com/api
        - VITE_UPLOAD_BASE_URL=https://staging.tech.filkx.com/api
        - VITE_BASE_URL=https://staging.tech.filkx.com
    restart: always
    volumes:
      - ./frontend/dist:/app/dist:ro
    ports:
      - "8075:80"
    networks:
      - filkx

  # ================= API (nginx → php-fpm) =================
  staging-tech-api:
    build:
      context: api/docker
      dockerfile: staging/nginx/Dockerfile
    restart: always
    depends_on:
      - staging-tech-api-php-fpm
    volumes:
      - ./api:/app
      - /var/www/staging.tech.filkx.com/shared/storage:/app/storage
    ports:
      - "8076:80"
    networks:
      - filkx

  # ================= PHP-FPM =================
  staging-tech-api-php-fpm:
    build:
      context: api/docker
      dockerfile: staging/php-fpm/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
      - /var/www/staging.tech.filkx.com/shared/storage:/app/storage
    networks:
      - filkx

  # ================= API CLI =================
  staging-tech-api-php-cli:
    build:
      context: api/docker
      dockerfile: staging/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
      - /var/www/staging.tech.filkx.com/shared/storage:/app/storage
    networks:
      - filkx
    command: tail -f /dev/null

  staging-tech-api-scheduler:
    build:
      context: api/docker
      dockerfile: staging/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
      - /var/www/staging.tech.filkx.com/shared/storage:/app/storage
    networks:
      - filkx
    command: >
      sh -c "while true; do php artisan schedule:run >> /app/storage/logs/scheduler.log 2>&1; sleep 30; done"

  # ================= POSTGRES =================
  staging-tech-api-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_DATABASE}'
    volumes:
      - staging-tech-api-postgres-data:/var/lib/postgresql/data
    ports:
      - '54322:5432'
    networks:
      - filkx

  staging-tech-redis:
    image: redis:alpine
    restart: always
    volumes:
      - staging-tech-redis-data:/data
    networks:
      - filkx
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      retries: 3
      timeout: 5s

  staging-tech-api-queue:
    build:
      context: api/docker
      dockerfile: staging/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
      - /var/www/staging.tech.filkx.com/shared/storage:/app/storage
    networks:
      - filkx
    depends_on:
      - staging-tech-redis
      - staging-tech-api-postgres
    command: [ "php", "artisan", "queue:work", "--tries=3", "--sleep=3", "--timeout=90" ]

  # ================= MEILISEARCH =================
  staging-tech-meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: always
    ports:
      - "7702:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-secret_master_key_change_in_production}
    volumes:
      - staging-tech-meilisearch-data:/meili_data
    networks:
      - filkx

networks:
  filkx:
    external: true

volumes:
  staging-tech-api-postgres-data:
  staging-tech-redis-data:
  staging-tech-meilisearch-data:
