  tech-redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis:/data
    networks:
      - filkx
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      retries: 3
      timeout: 5s

  tech-api-queue:
    container_name: tech-api-queue
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
    depends_on:
      tech-redis:
        condition: service_healthy
      tech-api-postgres:
        condition: service_healthy
      tech-api-php-fpm:
        condition: service_healthy
