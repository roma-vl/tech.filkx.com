services:
  #  Це юоли є dist але треба вирубити "frontend-dev"
  tech-frontend-spa:
    build:
      context: frontend/docker
      dockerfile: development/node/Dockerfile
    volumes:
      - ./frontend:/app
    command: [ "sh", "-c", "npm install && npm run dev" ]
    environment:
      - VITE_API_BASE_URL=https://dev.api.tech.filkx.com/api
      - VITE_UPLOAD_BASE_URL=https://dev.api.tech.filkx.com/api
      - VITE_BASE_URL=https://dev.tech.filkx.com
    networks:
      - filkx
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tech-frontend-spa.rule=Host(`dev.tech.filkx.com`)"
      - "traefik.http.routers.tech-frontend-spa.entrypoints=websecure"
      - "traefik.http.routers.tech-frontend-spa.tls.certresolver=devresolver"
      - "traefik.http.services.tech-frontend-spa.loadbalancer.server.port=5173"

  tech-api:
    build:
      context: api/docker
      dockerfile: development/nginx/Dockerfile
    restart: always
    volumes:
      - ./api:/app
      - tech-nginx-temp:/var/cache/nginx
    depends_on:
      tech-api-php-fpm:
        condition: service_healthy
    networks:
      - filkx
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tech-api.rule=Host(`dev.api.tech.filkx.com`)"
      - "traefik.http.routers.tech-api.entrypoints=websecure"
      - "traefik.http.routers.tech-api.tls=true"
      - "traefik.http.routers.tech-api.tls.certresolver=devresolver"
      - "traefik.http.services.tech-api.loadbalancer.server.port=80"

  tech-frontend-node-cli:
    build:
      context: frontend/docker
      dockerfile: development/node/Dockerfile
    restart: always
    volumes:
      - ./frontend:/app
    networks:
      - filkx

  tech-api-php-fpm:
    container_name: tech-api-php-fpm
    build:
      context: api/docker
      dockerfile: development/php-fpm/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
    depends_on:
      tech-api-postgres:
        condition: service_healthy
      tech-redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "kill", "-0", "1" ]
      interval: 5s
      timeout: 5s
      retries: 3

  tech-api-php-cli:
    container_name: tech-api-php-cli
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
    command: tail -f /dev/null

  tech-api-scheduler:
    container_name: tech-api-scheduler
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
    depends_on:
      tech-api-postgres:
        condition: service_healthy
      tech-redis:
        condition: service_healthy
    command: >
      sh -c "while true; do /usr/local/bin/php /app/artisan schedule:run >> /app/storage/logs/scheduler.log 2>&1; sleep 30; done"

  tech-api-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: tech
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tech
    volumes:
      - api-postgres:/var/lib/postgresql/data
    ports:
      - "54323:5432"
    networks:
      - filkx
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U live -d live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  tech-redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis:/data
    networks:
      - filkx
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      retries: 3
      timeout: 5s

  tech-api-queue:
    container_name: tech-api-queue
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
    depends_on:
      tech-redis:
        condition: service_healthy
      tech-api-postgres:
        condition: service_healthy
      tech-api-php-fpm:
        condition: service_healthy
    command: [ "php", "artisan", "queue:work", "--tries=3", "--sleep=3", "--timeout=90" ]

  tech-meilisearch:
    container_name: tech-meilisearch
    image: getmeili/meilisearch:v1.7
    restart: always
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-secret}
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - filkx

networks:
  filkx:
    external: true

volumes:
  api-postgres:
  redis:
  meilisearch-data:
  tech-nginx-temp:
    driver: local
