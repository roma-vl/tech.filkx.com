#      - VITE_BASE_URL=https://dev.live.filkx.com
#      - VITE_APP_URL=https://dev.app.filkx.com
#    networks:
#      - filkx
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.live-frontend-ssr.rule=Host(`dev.live.filkx.com`)"
#      - "traefik.http.routers.live-frontend-ssr.entrypoints=websecure"
#      - "traefik.http.routers.live-frontend-ssr.tls.certresolver=devresolver"
#      - "traefik.http.services.live-frontend-ssr.loadbalancer.server.port=3000"
#    command: [ "sh", "-c", "npm install && npm run build && npm run serve:ssr" ]

  tech-api-php-fpm:
    container_name: tech-api-php-fpm
    build:
      context: api/docker
      dockerfile: development/php-fpm/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
    depends_on:
      live-api-postgres:
        condition: service_healthy
      live-redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "kill", "-0", "1" ]
      interval: 5s
      timeout: 5s
      retries: 3

  tech-api-php-cli:
    container_name: tech-api-php-cli
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
#    depends_on:
#      live-api-postgres:
#        condition: service_healthy
#      live-redis:
#        condition: service_healthy
#      live-api-php-fpm:
#        condition: service_healthy
#      live-rtmp-dev:
#        condition: service_healthy
#      live-ffmpeg-runner:
#        condition: service_healthy
    command: tail -f /dev/null

  tech-api-scheduler:
    container_name: tech-api-scheduler
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    restart: always
    user: "1000:1000"
    volumes:
      - ./api:/app
    networks:
      - filkx
    depends_on:
      tech-api-postgres:
        condition: service_healthy
      tech-redis:
        condition: service_healthy
      tech-rtmp-dev:
        condition: service_healthy
      tech-ffmpeg-runner:
        condition: service_healthy
    command: >
      sh -c "while true; do /usr/local/bin/php /app/artisan schedule:run >> /app/storage/logs/scheduler.log 2>&1; sleep 30; done"

  tech-api-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: tech
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tech
    volumes:
      - api-postgres:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    networks:
      - filkx
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U live -d live" ]
      interval: 5s
      timeout: 5s
      retries: 5

