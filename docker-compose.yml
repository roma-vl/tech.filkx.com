services:
  #  Це юоли є dist але треба вирубити "frontend-dev"
  tech-frontend-spa:
    build:
      context: frontend/docker
      dockerfile: development/node/Dockerfile
    volumes:
      - ./frontend:/app
    command: [ "sh", "-c", "npm install && npm run dev" ]
    environment:
      - VITE_API_BASE_URL=https://dev.api.tech.filkx.com/api
      - VITE_UPLOAD_BASE_URL=https://dev.api.tech.filkx.com/api
      - VITE_BASE_URL=https://dev.tech.filkx.com
    networks:
      - filkx
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.live-frontend-spa.rule=Host(`dev.tech.filkx.com`)"
      - "traefik.http.routers.live-frontend-spa.entrypoints=websecure"
      - "traefik.http.routers.live-frontend-spa.tls.certresolver=devresolver"
      - "traefik.http.services.live-frontend-spa.loadbalancer.server.port=5173"

  tech-api:
    build:
      context: api/docker
      dockerfile: development/nginx/Dockerfile
    restart: always
    volumes:
      - ./api:/app
      - live-nginx-temp:/var/cache/nginx
    depends_on:
      tech-api-php-fpm:
        condition: service_healthy
    networks:
      - filkx
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.live-api.rule=Host(`dev.api.tech.filkx.com`)"
      - "traefik.http.routers.live-api.entrypoints=websecure"
      - "traefik.http.routers.live-api.tls=true"
      - "traefik.http.routers.live-api.tls.certresolver=devresolver"
      - "traefik.http.services.live-api.loadbalancer.server.port=80"

  tech-frontend-node-cli:
    build:
      context: frontend/docker
      dockerfile: development/node/Dockerfile
    restart: always
    volumes:
      - ./frontend:/app
    networks:
      - filkx

  # SSR Production Server (uncomment to enable, comment live-frontend-dev to disable)
#  live-frontend-ssr:
#    build:
#      context: landing-ssr/docker
#      dockerfile: development/node/Dockerfile
#    restart: always
#    volumes:
