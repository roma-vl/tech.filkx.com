
server {
    listen 80;
#     server_name dev.api.app.filkx.com;

    charset utf-8;
    root /app/public;
    index index.php;

    # ---- важливі параметри для великих аплоадів ----
    client_max_body_size 2G;
    client_body_timeout 3600s;
    client_body_buffer_size 128M;          # buffer для body в пам'яті
    client_body_temp_path /var/cache/nginx/client_temp;  # temp для body
    send_timeout 3600s;
    fastcgi_read_timeout 3600s;

    proxy_read_timeout 3600s;
    proxy_connect_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_request_buffering off;
    proxy_buffering off;

    # Storage alias
    location /storage/ {
        alias /app/public/storage/;
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        location ~* \.php$ { deny all; }
    }

    # Основний Laravel роут
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass staging-live-api-php-fpm:9000;
        fastcgi_request_buffering off;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
